# 파이프라인 전체 설정

pipeline:
  language: ko          # STT/요약 언어
  target_duration: 55   # 쇼츠 목표 길이 (초, 최대 60)

stt:
  model_size: large-v3      # tiny | base | small | medium | large
  device: cuda           # cpu | cuda (CUDA 12.x 설치 후 cuda로 변경)
  compute_type: float16    # int8 (cpu) | float16 (cuda)

summarize:
  mode: local           # local | gpt
  max_chars: 300        # 한국어 기준 55초 ≈ 180자, 여유있게 300자
  ollama_model: llama3  # mode=local 시 사용할 Ollama 모델 llama3 or llama3.2:3b

tts:
  engine: edge-tts      # edge-tts | elevenlabs
  voice: ko-KR-SunHiNeural   # edge-tts 한국어 음성
  rate: "+0%"           # 속도 조절 (-50% ~ +100%)
  volume: "+0%"

video:
  resolution: [1080, 1920]         # 9:16 쇼츠
  fps: 30
  background_color: "black"
  font_path: "C:/Windows/Fonts/malgun.ttf"  # 한글 폰트
  font_size: 48
  font_color: "white"
  font_border_color: "black"
  font_border_width: 2

image:
  engine: picsum          # picsum(테스트용 랜덤 사진) | pollinations | auto | sd | gradient
  pollinations_model: flux
  img_width: 576          # 9:16 비율 (576x1024)
  img_height: 1024
  style_suffix: "cinematic dramatic lighting, high quality, photorealistic, vertical portrait"
  ollama_model: llama3    # Ollama 있으면 한→영 프롬프트 번역, 없으면 기본값 사용
  # Stable Diffusion 설정 (engine=sd 또는 auto일 때)
  model_id: runwayml/stable-diffusion-v1-5
  steps: 20
  negative_prompt: "text, watermark, logo, blurry, low quality, ugly"

paths:
  raw: data/raw
  transcripts: data/transcripts
  audio: data/audio
  output: data/output
